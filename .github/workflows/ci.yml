name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax (bash -n)
        run: |
          bash -n skills/fusion-review/review.sh
          bash -n install.sh

      - name: ShellCheck (errors)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -S error skills/fusion-review/review.sh install.sh

      - name: Usage smoke
        run: bash skills/fusion-review/review.sh --help | grep -q 'fan <role>'

      # The four checks above (syntax, shellcheck, --help grep, install idempotency) were all green
      # while triage was dropping findings from both denominators and routing findings back to their
      # own author. Behaviour has to be asserted, not linted. Fixture-only: no model CLI, no network.
      - name: Triage regression tests
        run: bash tests/triage-test.sh

      - name: install.sh is idempotent
        run: |
          mkdir -p "$HOME/.claude"   # simulate a host so the linker has a target
          ./install.sh
          ./install.sh               # second run must also succeed
          test -L "$HOME/.claude/skills/fusion-review"
